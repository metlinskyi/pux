<script>
document.addEventListener("DOMContentLoaded", () => { 
   Array.from(document.getElementsByTagName("form"))
        .forEach(form => form.addEventListener("submit", async (event) => 
        {
            event.preventDefault();
            event.stopPropagation();
            
            const endpoint = event.target.action;
            var payload = {};
            new FormData(event.target).forEach(function(value, key){
                payload[key] = value;
            });

            form.querySelectorAll(".state").forEach(e => e.remove());

            try {

                const response = await fetch(endpoint, {
                    headers: {
                        "Content-Type": "application/json"
                    },
                    method: event.target.method.toUpperCase(),
                    body: JSON.stringify(payload),
                });

                if(response.status === 202)
                {
                    const progress = document.createElement("progress");
                    progress.className = "state";
                    progress.max = 100;
                    form.appendChild(progress);

                    const statusUrl = response.headers.get('location');
                    const es = new EventSource(statusUrl);
                    es.addEventListener('progress', (event) => {
                        const data = JSON.parse(event.data);
                        console.log(data);
                        progress.value = data.Value;
                    });
                    es.addEventListener('result', (event) => {
                        const data = JSON.parse(event.data);
                        console.log(data);
                        es.close();
                        progress.remove();
                    });
                }
                else if(response.status === 200)
                {
                    const data = await response.json();
                    console.log(data);
                }
                else
                {
                    const er = document.createElement("div")
                    er.className = "state";
                    er.innerText = response.statusText;
                    form.appendChild(er);
                }

            } catch (e) {
                console.error(e);
            }
            return false;
        }));
}); 
</script>

<fieldset>
    <caption>Async</caption>
    <form action="/directory/diff/async" method="post">
        <input type="text" name="Path" value="/Web" />
        <input type="submit"/>
    </form>
</progress>
</fieldset>

<fieldset>
    <caption>Sync</caption>
    <form action="/directory/diff/sync" method="post">
        <input type="text" name="Path" value="/Web" />
        <input type="submit"/>
    </form>
</fieldset>
